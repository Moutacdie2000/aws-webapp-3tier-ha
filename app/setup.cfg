# Configuration des outils de qualité du tier applicatif.

[flake8]
# Aligne la longueur de ligne sur le formatage moderne (Black : 88).
max-line-length = 100
extend-ignore =
    # E203 : faux positif sur les slices, incompatible avec Black.
    E203
exclude =
    .git,
    __pycache__,
    .pytest_cache

[tool:pytest]
addopts = -q
python_files = test_*.py
