# =============================================================================
# CI, qualité applicative, scan de sécurité et publication d'image vers ECR.
#
# L'authentification AWS se fait par OIDC (aucune clé secrète stockée dans
# GitHub). Le rôle assumé doit faire confiance au fournisseur OIDC GitHub.
# =============================================================================
name: CI

on:
  # Pipeline à déclenchement manuel (Actions → « Run workflow »).
  # Le push d'image vers ECR cible un vrai compte AWS via OIDC.
  workflow_dispatch:

# Permissions minimales : lecture du dépôt + émission du jeton OIDC.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: webapp-3tier-dev-app
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + tests unitaires
  # ---------------------------------------------------------------------------
  quality:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation des dépendances de dev
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Lint (flake8)
        working-directory: app
        run: flake8 .

      - name: Tests (pytest)
        working-directory: app
        run: pytest -v

  # ---------------------------------------------------------------------------
  # Build de l'image, scan Trivy, puis push vers ECR (uniquement sur main).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build, scan & push
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t "$ECR_REPOSITORY:${GITHUB_SHA}" app

      - name: Scan de vulnérabilités (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Authentification AWS via OIDC
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connexion à ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & push de l'image
        if: github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        # Le dépôt ECR est en tags IMMUTABLES : on ne pousse qu'un tag unique
        # (le SHA de commit). On ne ré-écrit pas un tag mobile « latest », ce qui
        # échouerait sur un dépôt immuable. Le déploiement référence ce SHA.
        run: |
          docker tag "$ECR_REPOSITORY:${GITHUB_SHA}" "$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}"
          docker push "$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}"
