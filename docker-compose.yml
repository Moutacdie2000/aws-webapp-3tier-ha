# =============================================================================
# Pile de développement local, reproduit les tiers applicatif + données.
#
#   docker compose up --build
#   → application sur http://localhost:8000
#
# Postgres remplace ici RDS ; les identifiants sont passés en variables
# d'environnement (en production, ils proviennent de Secrets Manager).
# =============================================================================

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: webapp-3tier-app:local
    ports:
      - "8000:8000"
    environment:
      APP_VERSION: local
      AWS_REGION: eu-west-3
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: localpassword
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localpassword
    ports:
      # Exposé en local pour inspection (psql, DBeaver...). Non exposé en prod.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
